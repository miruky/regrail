<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200" role="img" aria-label="regrailのアーキテクチャ図">
  <title>regrailのアーキテクチャ</title>
  <style>
    :root {
      --ink: #585f68;
      --faint: #8b919b;
      --rule: #d6d0c2;
      --accent: #2f6d7a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #a3a8ae;
        --faint: #6f757d;
        --rule: #363b43;
        --accent: #6fb3bf;
      }
    }
    .box { fill: none; stroke: var(--rule); stroke-width: 1.5; }
    .accent-box { fill: none; stroke: var(--accent); stroke-width: 1.5; }
    .label { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: var(--ink); }
    .small { font: 400 11.5px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: var(--faint); }
    .accent-label { font: 700 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: var(--accent); }
    .arrow { stroke: var(--faint); stroke-width: 1.5; fill: none; marker-end: url(#head); }
    .arrowhead { fill: var(--faint); }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" class="arrowhead" />
    </marker>
  </defs>

  <rect x="20" y="62" width="150" height="76" rx="8" class="box" />
  <text x="40" y="90" class="label">入力</text>
  <text x="40" y="112" class="small">正規表現</text>
  <text x="40" y="128" class="small">テスト文字列</text>

  <rect x="240" y="62" width="150" height="76" rx="8" class="accent-box" />
  <text x="260" y="90" class="accent-label">parse</text>
  <text x="260" y="112" class="small">再帰下降パーサ</text>
  <text x="260" y="128" class="small">AST(idつき)</text>

  <rect x="460" y="20" width="150" height="76" rx="8" class="box" />
  <text x="480" y="48" class="label">renderRailroad</text>
  <text x="480" y="70" class="small">ASTをSVGに</text>
  <text x="480" y="86" class="small">鉄道図レイアウト</text>

  <rect x="460" y="116" width="150" height="76" rx="8" class="box" />
  <text x="480" y="144" class="label">runMatch</text>
  <text x="480" y="166" class="small">バックトラッキング</text>
  <text x="480" y="182" class="small">stepのtraceを記録</text>

  <rect x="680" y="62" width="140" height="76" rx="8" class="box" />
  <text x="700" y="90" class="label">UI</text>
  <text x="700" y="112" class="small">図とtraceを同期</text>
  <text x="700" y="128" class="small">状態をURLに保存</text>

  <path class="arrow" d="M170 100 H232" />
  <path class="arrow" d="M390 92 C420 84 425 60 452 58" />
  <path class="arrow" d="M390 108 C420 118 425 150 452 154" />
  <path class="arrow" d="M610 58 C640 64 645 80 678 90" />
  <path class="arrow" d="M610 154 C640 146 645 128 678 116" />
</svg>
